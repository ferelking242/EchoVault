name: Android Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create keystore
        run: |
          keytool -genkey -v -keystore app/keystore.jks -alias echovault -keyalg RSA -keysize 2048 -validity 10000 -storepass echovault123 -keypass echovault123 -dname "CN=EchoVault, OU=AIVOS, O=AIVOS, L=Paris, ST=IDF, C=FR"

      - name: Run Unit Tests
        run: ./gradlew test --no-daemon
        continue-on-error: true

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: echovault123
          KEY_ALIAS: echovault
          KEY_PASSWORD: echovault123

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: echovault-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: echovault-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30