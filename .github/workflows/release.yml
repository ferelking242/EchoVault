name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create keystore
        run: |
          keytool -genkey -v -keystore app/keystore.jks -alias echovault -keyalg RSA -keysize 2048 -validity 10000 -storepass echovault123 -keypass echovault123 -dname "CN=EchoVault, OU=AIVOS, O=AIVOS, L=Paris, ST=IDF, C=FR"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PASSWORD: echovault123
          KEY_ALIAS: echovault
          KEY_PASSWORD: echovault123

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EchoVault ${{ github.ref_name }}
          body: |
            ## EchoVault ${{ github.ref_name }}
            Biometric security, encrypted storage, Material 3 UI, clipboard history manager.
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}